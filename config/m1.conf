# --- KEYBOARD NAME ---
# Hier legst du fest, wie das Board im Bluetooth-Menü heißt
CONFIG_ZMK_KEYBOARD_NAME="M1"

# --- POWER MANAGEMENT ---
# Aktiviert den Tiefschlaf-Modus
CONFIG_ZMK_SLEEP=y
# Zeit bis zum Tiefschlaf (15 Minuten = 900.000 ms)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Meldet den Akkustand an Windows/Android/iOS
CONFIG_ZMK_BATTERY_REPORTING=y

# --- BLUETOOTH & CONNECTIVITY ---
# Maximale Sendeleistung für stabilere Verbindung
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# USB-Unterstützung einschalten
CONFIG_ZMK_USB=y

# --- HARDWARE SPEZIFISCH ---
# Wichtig für dein Board: Nutzt die NFC-Pins (P0.09 & P0.10) als normale GPIOs
# Ohne dies funktionieren die Pins D10/D11 auf deinem Pro Micro nicht!
CONFIG_NFCT_PINS_AS_GPIOS=y

# --- ERZWUNGENE MAC-ADRESSE ---
# Ändert die Bluetooth-Identität, um alte Cache-Einträge am PC zu umgehen.
# Ersetze die Zahlen durch eine beliebige Kombination aus 0-9 und A-F
CONFIG_BT_DEVICE_APPEARANCE=961
CONFIG_BT_DEVICE_NAME="M1 Orb"
CONFIG_BT_GATT_DYNAMIC_DB=y
CONFIG_BT_SETTINGS=y
CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=y
