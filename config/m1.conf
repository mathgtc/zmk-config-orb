# Aktiviert die NFC-Pins als normale Tasten (D10 und D11)
CONFIG_NFCT_PINS_AS_GPIOS=y

# Erhöht die Bluetooth-Leistung
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Erlaubt USB-Verbindung
CONFIG_ZMK_USB=y

# Bluetooth aktivieren
CONFIG_ZMK_BLE=y

# Maximale Sendeleistung (hilft gegen Verbindungsabbrüche)
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Erlaubt das Pairen mit mehreren Geräten
CONFIG_ZMK_BT_CLEAR_ON_START=n
